name: darija_friend
description: Dostok - Your AI friend that speaks Darija
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Styling
  google_fonts: ^6.1.0
  animated_text_kit: ^4.2.2
  lottie: ^2.7.0
  avatar_glow: ^2.0.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.3.0
  gap: ^3.0.1

  # Networking
  http: ^1.1.0

  # Speech & Audio
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5

  # In-App Purchases
  in_app_purchase: ^3.2.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.6
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.4
  firebase_messaging: ^15.2.4

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.2

  # Ads
  google_mobile_ads: ^5.3.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Configuration
  flutter_dotenv: ^5.2.1

  # Celebration & Fun
  confetti: ^0.7.0

  # Social
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
